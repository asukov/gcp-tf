name: 'Terraform Deploy via WIF'

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_apply:
        description: 'Set to true to approve deletions/modifications'
        type: boolean
        default: false

# CRITICAL: You must explicitly request these permissions for OIDC to work!
permissions:
  contents: 'read'
  id-token: 'write' # This allows GitHub to mint the OIDC token

jobs:
  # terraform-scan:
  #   name: 'Terraform Scan'
  #   runs-on: ubuntu-latest

  #   # Tell GitHub Actions that every 'run' step in this job 
  #   # should execute inside the './sample-project' folder
  #   defaults:
  #     run:
  #       working-directory: ./sample-project

  #   steps:
  #   - name: 'Checkout Repository'
  #     uses: actions/checkout@v4

  #   - name: Run Checkov IaC scan
  #     uses: bridgecrewio/checkov-action@master
  #     with:
  #       directory: /
  #       framework: terraform
  #       output_format: cli
  #       skip_check: >-
  #         CKV_GCP_42,
  #         CKV_GCP_49,
  #         CKV_GCP_125

  terraform-plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sample-project
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
      is_risky: ${{ steps.plan.outputs.is_risky }}
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/588269308956/locations/global/workloadIdentityPools/github-actions-pool-v2/providers/github-actions-provider'
          service_account: 'asukov-tf-rw@boxwood-bee-484209-r9.iam.gserviceaccount.com'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"

      - run: terraform init

      # detailed-exitcode returns 2 if there are changes, 0 if no changes
      - name: 'Terraform Plan'
        id: plan
        continue-on-error: true
        run: |
          terraform plan -detailed-exitcode -out=tfplan
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Check for deletions/updates only if changes exist
            RISKY=$(terraform show -json tfplan | jq '[.resource_changes[]?.change.actions[] | select(. == "delete" or . == "update")] | length > 0')
            echo "is_risky=$RISKY" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "is_risky=false" >> $GITHUB_OUTPUT
          else
            exit $EXIT_CODE # Actual error
          fi

      - name: 'Upload Plan'
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ./sample-project/tfplan

  terraform-apply:
    name: 'Apply'
    needs: terraform-plan
    # Logic: Only run if changes exist AND (it's not risky OR user clicked force checkbox)
    if: |
      needs.terraform-plan.outputs.has_changes == 'true' && 
      (needs.terraform-plan.outputs.is_risky == 'false' || github.event.inputs.force_apply == true)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sample-project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./sample-project

      - name: 'Authenticate to Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/588269308956/locations/global/workloadIdentityPools/github-actions-pool-v2/providers/github-actions-provider'
          service_account: 'asukov-tf-rw@boxwood-bee-484209-r9.iam.gserviceaccount.com'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.4"

      - run: terraform init
      - run: terraform apply -auto-approve tfplan